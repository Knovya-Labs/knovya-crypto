name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    defaults:
      run:
        working-directory: crypto/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: crypto/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        # NOTE: package.json ships as a placeholder in the initial release.
        # The reference implementation will be committed in a future release;
        # the steps below become active once it lands.
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true

      - name: Unit tests (vitest)
        run: npm test -- --run --coverage
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-node-${{ matrix.node }}
          path: crypto/frontend/coverage/
          if-no-files-found: ignore
          retention-days: 14

  backend:
    name: backend (python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12"]
    defaults:
      run:
        working-directory: crypto/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
        continue-on-error: true

      - name: Pytest
        run: pytest -q --cov=. --cov-report=xml
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-python-${{ matrix.python }}
          path: crypto/backend/coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  vectors:
    name: Wycheproof vectors
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run AES-GCM KAT
        working-directory: crypto/tests
        run: |
          if [ -f wycheproof-aes-gcm.test.ts ]; then
            npm ci --no-audit --no-fund
            npx vitest run wycheproof-aes-gcm.test.ts
          else
            echo "Wycheproof vectors activate once the reference implementation is available."
          fi
        continue-on-error: true
