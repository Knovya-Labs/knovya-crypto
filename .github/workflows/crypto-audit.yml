name: crypto-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"  # Monday 04:00 UTC

permissions:
  contents: read
  security-events: write

concurrency:
  group: crypto-audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mutation-frontend:
    name: mutation (stryker, frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crypto/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crypto/frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
        continue-on-error: true
      - name: Stryker mutation
        run: npx stryker run --reporters progress,html,clear-text
        continue-on-error: true
      - name: Enforce mutation score ≥ 80%
        run: |
          # Placeholder: the concrete gate activates once the reference
          # implementation is committed.
          # When enabled, this step parses reports/mutation/mutation.json
          # and exits non-zero if `mutationScore < 80`.
          echo "Mutation score gate: ≥ 80% (enforced once the reference implementation is committed)."
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-report
          path: crypto/frontend/reports/mutation/
          if-no-files-found: ignore
          retention-days: 30

  property-frontend:
    name: property-based (fast-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crypto/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crypto/frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
        continue-on-error: true
      - name: Run property-based suite
        env:
          FAST_CHECK_NUM_RUNS: "1000"
        run: npx vitest run --testNamePattern="property"
        continue-on-error: true

  property-backend:
    name: property-based (hypothesis)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crypto/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
        continue-on-error: true
      - name: Run hypothesis suite
        env:
          HYPOTHESIS_PROFILE: "ci"
        run: pytest -q -m "property"
        continue-on-error: true

  wycheproof:
    name: Wycheproof vectors (AES-GCM, PBKDF2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Wycheproof tests
        working-directory: crypto/tests
        run: |
          if [ -f wycheproof-aes-gcm.test.ts ]; then
            npm ci --no-audit --no-fund
            npx vitest run wycheproof-aes-gcm.test.ts wycheproof-pbkdf2.test.ts
          else
            echo "Wycheproof vectors activate once the reference implementation is available."
          fi
        continue-on-error: true

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crypto/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Audit (moderate and above)
        run: npm audit --audit-level=moderate
        continue-on-error: true

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crypto/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: |
          if [ -f requirements-dev.txt ]; then
            pip-audit -r requirements-dev.txt --strict
          else
            echo "requirements-dev.txt ships with the reference implementation."
          fi
        continue-on-error: true

  summary:
    name: audit summary
    runs-on: ubuntu-latest
    needs:
      - mutation-frontend
      - property-frontend
      - property-backend
      - wycheproof
      - npm-audit
      - pip-audit
    if: always()
    steps:
      - name: Emit summary
        run: |
          echo "### crypto-audit summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mutation score target: **≥ 80%** (Stryker, frontend)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Property-based invariants: **≥ 10** per primitive" >> "$GITHUB_STEP_SUMMARY"
          echo "- Wycheproof KAT: all applicable vectors green" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dependency audit: npm audit (moderate+), pip-audit (strict)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "*Thresholds are reported but not enforced until the reference implementation lands.*" >> "$GITHUB_STEP_SUMMARY"
